<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a2540">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KE Schedule">
<link rel="manifest" href="manifest.json">
<title>KE SCHEDULE UPLOADER</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans KR',sans-serif;background:#f0ede8;color:#111;min-height:100vh;letter-spacing:-0.2px}
:root{--c1:#0a2540;--c2:#1a4a7a;--c3:#e6f0fa;--c4:#2962a8;--acc:#e8420a;--radius:8px}
.app{max-width:980px;margin:0 auto;padding:20px}

/* ── Header ── */
.header{background:var(--c1);color:#fff;padding:18px 22px;border-radius:var(--radius);margin-bottom:14px;border-left:5px solid var(--acc)}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.header h1{font-size:17px;font-weight:700;letter-spacing:-0.5px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase}
.header p{font-size:11px;opacity:0.6;font-family:'IBM Plex Mono',monospace}

/* ── Steps ── */
.steps{display:flex;margin-bottom:14px;background:#fff;border-radius:var(--radius);overflow:hidden;border:1px solid rgba(0,0,0,0.12)}
.step{flex:1;padding:10px 8px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;border-right:1px solid rgba(0,0,0,0.08);transition:all .15s;color:#666;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px;text-transform:uppercase}
.step:last-child{border-right:none}
.step.active{background:var(--c1);color:#fff}
.step.done{background:#e6f0fa;color:var(--c2)}
.step-num{display:block;font-size:18px;font-weight:700;margin-bottom:1px;font-family:'IBM Plex Mono',monospace}

/* ── Cards ── */
.card{background:#fff;border-radius:var(--radius);border:1px solid rgba(0,0,0,0.1);padding:16px;margin-bottom:12px}
.card h2{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--c1);display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace;border-bottom:2px solid var(--c1);padding-bottom:8px}
.form-row{display:flex;gap:12px;margin-bottom:12px}
.form-group{flex:1}
.form-group label{display:block;font-size:11px;font-weight:600;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace}
input[type=text]{width:100%;padding:8px 10px;border:1px solid rgba(0,0,0,0.18);border-radius:5px;font-size:13px;font-family:'IBM Plex Mono',monospace;font-weight:500}
input[type=text]:focus{outline:2px solid var(--c4);outline-offset:1px}
textarea{width:100%;padding:10px;border:1px solid rgba(0,0,0,0.15);border-radius:5px;font-size:11.5px;font-family:'IBM Plex Mono',monospace;resize:vertical;background:#f7f5f1;line-height:1.6}
textarea:focus{outline:2px solid var(--c4);outline-offset:1px}

/* ── Buttons ── */
.btn{padding:9px 18px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .12s;letter-spacing:.3px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace}
.btn-primary{background:var(--c1);color:#fff}
.btn-primary:hover{background:var(--c2)}
.btn-secondary{background:transparent;color:var(--c1);border:1.5px solid var(--c1)}
.btn-secondary:hover{background:var(--c3)}
.btn-google{background:#4285f4;color:#fff}
.btn-google:hover{background:#3367d6}
.btn-csv{background:#16803c;color:#fff}
.btn-csv:hover{background:#166534}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 12px;font-size:11px}
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace}
.badge-flight{background:#dbeafe;color:#1e3a8a}
.badge-do{background:#dcfce7;color:#14532d}
.badge-sby{background:#fef9c3;color:#713f12}
.badge-lo{background:#f1f0ec;color:#444}
.badge-reserve{background:#ede9fe;color:#4c1d95}

/* ── Table ── */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 7px;border-bottom:2px solid var(--c1);font-weight:700;font-size:10px;color:var(--c1);background:#f5f3ef;text-transform:uppercase;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace}
td{padding:7px 7px;border-bottom:.5px solid rgba(0,0,0,.07);vertical-align:middle;font-size:12px}
tr:hover td{background:rgba(41,98,168,.04)}

/* ── Summary bar ── */
.summary-bar{display:flex;gap:12px;padding:10px 16px;background:var(--c1);border-radius:var(--radius);margin-bottom:12px;align-items:center;flex-wrap:wrap}
.summary-item{display:flex;align-items:baseline;gap:5px}
.summary-num{font-weight:700;font-size:16px;color:#fff;font-family:'IBM Plex Mono',monospace}
.summary-label{font-size:11px;color:rgba(255,255,255,.55);font-family:'IBM Plex Mono',monospace;letter-spacing:.3px}

/* ── Calendar ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-header-cell{text-align:center;font-size:10px;font-weight:700;padding:6px 2px;color:var(--c1);font-family:'IBM Plex Mono',monospace;letter-spacing:.5px}
.cal-cell{min-height:80px;background:#fff;border:.5px solid rgba(0,0,0,.09);border-radius:3px;padding:4px;cursor:pointer;transition:border-color .12s}
.cal-cell:hover{border-color:var(--c4)}
.cal-cell.other-month{opacity:.3}
.cal-cell.selected{border:2px solid var(--c1);background:#e6f0fa}
.cal-cell .date-num{font-size:11px;font-weight:700;margin-bottom:2px;color:#666;font-family:'IBM Plex Mono',monospace}
.cal-event{font-size:9.5px;padding:2px 4px;border-radius:2px;margin-bottom:1px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'IBM Plex Mono',monospace;font-weight:600}
.ev-flight{background:#dbeafe;color:#1e3a8a}
.ev-trip{background:#fef3c7;color:#78350f}
.ev-do{background:#dcfce7;color:#14532d}
.ev-sby{background:#fef9c3;color:#713f12}
.ev-reserve{background:#ede9fe;color:#4c1d95}
.ev-rdo{background:#e0f2fe;color:#0c4a6e}

/* ── Detail panel ── */
.detail-panel{background:#f5f3ef;border:1px solid rgba(0,0,0,.1);border-radius:var(--radius);padding:14px;margin-top:10px}
.detail-panel h3{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--c1);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.4px}
.ev-detail-block{margin-bottom:12px;padding-bottom:12px;border-bottom:.5px solid rgba(0,0,0,.1)}
.ev-detail-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.ev-detail-title{font-weight:700;font-size:12px;margin-bottom:5px;font-family:'IBM Plex Mono',monospace}
pre.desc-block{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:4px;padding:8px;font-size:10.5px;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;font-family:'IBM Plex Mono',monospace;line-height:1.6}

/* ── Tabs ── */
.tab-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid rgba(0,0,0,.15);background:transparent;color:#666;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px;text-transform:uppercase;transition:all .12s}
.tab.active{background:var(--c1);color:#fff;border-color:var(--c1)}

/* ── Google auth bar ── */
.auth-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f0f7ff;border:1px solid #b3d4f7;border-radius:6px;margin-bottom:12px;font-size:12px;flex-wrap:wrap}
.auth-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.auth-dot.ok{background:#16a34a}
.auth-dot.no{background:#dc2626}
.auth-status-text{flex:1;font-family:'IBM Plex Mono',monospace;font-size:11px}
.auth-user{font-weight:700;color:var(--c2)}

/* ── Progress ── */
.progress-wrap{background:#e5e7eb;border-radius:4px;height:8px;margin:8px 0;overflow:hidden}
.progress-bar{height:100%;background:var(--c4);border-radius:4px;transition:width .3s}

/* ── Export section ── */
.export-section{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
@media(max-width:600px){.export-section{grid-template-columns:1fr}.form-row{flex-direction:column}}
.export-card{border:1px solid rgba(0,0,0,.12);border-radius:6px;padding:14px}
.export-card h3{font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid}
.export-card.gcal h3{color:#4285f4;border-color:#4285f4}
.export-card.csv h3{color:#16803c;border-color:#16803c}
.export-card p{font-size:11px;color:#555;line-height:1.6;margin-bottom:10px}

/* ── Misc ── */
.lo-row td{color:#aaa!important;font-style:italic}
.alert{padding:10px 14px;border-radius:5px;font-size:12px;margin-bottom:10px;font-family:'IBM Plex Mono',monospace;border-left:3px solid;line-height:1.6}
.alert-info{background:#e6f0fa;color:#0a2540;border-color:var(--c4)}
.alert-warn{background:#fef9c3;color:#713f12;border-color:#ca8a04}
.alert-success{background:#dcfce7;color:#14532d;border-color:#16a34a}
.alert-danger{background:#fee2e2;color:#7f1d1d;border-color:#dc2626}
.result-log{background:#0a2540;color:#a3e635;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:10px;border-radius:5px;max-height:200px;overflow-y:auto;line-height:1.7;margin-top:8px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <span style="font-size:20px">✈</span>
      <h1>KE SCHEDULE UPLOADER</h1>
    </div>
    <p>월간스케줄(MY SCHEDULE)과 Crew Roster Report에서 HTML로 출력하여 복사한 텍스트를 붙여넣으면 자동으로 변환합니다.</p>
  </div>
  <div class="steps" id="steps-bar"></div>
  <div id="content"></div>
</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONFIGURATION — Google OAuth
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ★ 여기에 Google Cloud Console에서 발급받은 클라이언트 ID를 입력하세요 ★
const GOOGLE_CLIENT_ID = '786826547399-q5l3gviqeechjo9t21iup9psjaluakqo.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/calendar.readonly';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Constants
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const KOREAN_AIRPORTS = ['GMP','ICN','CJU','PUS','TAE','KWJ','RSU','YNY','WJU','HIN','MPK','USN','KUV'];
const RANK_ORDER = ['CAP','FO','PUR','CS','CA'];
const ALLDAY_DISPLAY = {
  'HM_SBY':'Home ST-BY','AP_SBY':'Airport ST-BY',
  'DO':'DO','RDO':'RDO','ADO':'ADO','ATDO':'ATDO','RESERVE':'RESERVE'
};
const TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// State
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const state = {
  step: 1,
  crewId: '',       // parseTextB 헤더에서 자동 감지
  actingRank: '',   // parseTextB 헤더에서 자동 감지
  selfName: '',     // parseTextB 헤더에서 자동 감지
  textA: '', textB: '',
  parsedA: [], parsedB: {}, merged: [], events: [],
  year: new Date().getFullYear(),
  month: new Date().getMonth() + 1,
  selectedDate: null,
  // Google auth
  accessToken: null,
  userEmail: '',
  calendars: [],
  selectedCalendarId: 'primary',
  // upload state
  filterFromDate: '',  // 이 날짜 이후 이벤트만 등록/CSV출력
  uploading: false,
  uploadLog: [],
  uploadDone: false,
  uploadResults: { ok: 0, skip: 0, fail: 0 }
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Auto-detect year & month
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function autoDetectYearMonth(textA, textB) {
  // 1순위: 입력창 B의 STD 날짜에서 추출 (가장 정확)
  if (textB) {
    const m = textB.match(/(\d{4})-(\d{2})-\d{2}/);
    if (m) return { year: parseInt(m[1]), month: parseInt(m[2]), source: '입력창 B' };
  }
  // 2순위: 입력창 A에서 날짜 패턴 추출 (YYYY-MM-DD 형식이 있을 경우)
  if (textA) {
    const m = textA.match(/(\d{4})-(\d{2})-\d{2}/);
    if (m) return { year: parseInt(m[1]), month: parseInt(m[2]), source: '입력창 A' };
  }
  // 3순위: 현재 날짜 기준
  const now = new Date();
  return { year: now.getFullYear(), month: now.getMonth() + 1, source: '현재 날짜' };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Parsing — Text A (calendar grid)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function parseTextA(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const DAYS = new Set(['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']);
  let curDate = null;
  const items = [];
  const y = state.year, m = state.month;

  for (const l of lines) {
    if (DAYS.has(l)) continue;
    if (/^\d{1,2}$/.test(l)) {
      const day = parseInt(l);
      curDate = { y, m, day };
      continue;
    }
    if (!curDate) continue;
    const ds = `${curDate.y}-${pad(curDate.m)}-${pad(curDate.day)}`;

    const loM = l.match(/^LO([A-Z]{3})$/);
    if (loM) { items.push({ date: ds, type: 'LO', airport: loM[1] }); continue; }

    const hmM = l.match(/^(HM_SBY\d*)([A-Z]{3})\s+(\d{2}:\d{2})\s*-\s*[A-Z]{3}\s+(\d{2}:\d{2})$/);
    if (hmM) { items.push({ date: ds, type: 'HM_SBY', rawCode: hmM[1], start: hmM[3], end: hmM[4] }); continue; }

    const apM = l.match(/^(AP_SBY\d*)([A-Z]{3})\s+(\d{2}:\d{2})\s*-\s*[A-Z]{3}\s+(\d{2}:\d{2})$/);
    if (apM) { items.push({ date: ds, type: 'AP_SBY', rawCode: apM[1], start: apM[3], end: apM[4] }); continue; }

    const offM = l.match(/^(DO|RDO|ADO|ATDO|RESERVE)$/);
    if (offM) { items.push({ date: ds, type: offM[1] }); continue; }

    const flM = l.match(/^([A-Z0-9]{2,6}[A-Z]?)([A-Z]{3})\s+(\d{2}:\d{2})\s*-\s*([A-Z]{3})\s+(\d{2}:\d{2})$/);
    if (flM) {
      items.push({ date: ds, type: 'FLIGHT', flightNum: flM[1], dep: flM[2], depTime: flM[3], arr: flM[4], arrTime: flM[5] });
      continue;
    }

    // 위 패턴에 모두 해당하지 않는 코드 → UNKNOWN으로 수집
    if (/^[A-Z0-9]/.test(l)) {
      // 시간대 포함 여부 확인: {코드}{공항} {HH:MM} - {공항} {HH:MM}
      const ukTimeM = l.match(/^([A-Z0-9]+?)([A-Z]{3})\s+(\d{2}:\d{2})\s*-\s*[A-Z]{3}\s+(\d{2}:\d{2})$/);
      if (ukTimeM) {
        items.push({ date: ds, type: 'UNKNOWN', rawCode: ukTimeM[1], start: ukTimeM[3], end: ukTimeM[4] });
      } else {
        items.push({ date: ds, type: 'UNKNOWN', rawCode: l });
      }
    }
  }
  return items;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Parsing — Text B (crew table)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function parseTextB(text) {
  const FN_RE   = /^[A-Z]{2,3}\d{1,4}[A-Z]?$/;
  const DATE_RE = /^\d{4}-\d{2}-\d{2}/;
  const CREW_RE = /^\d{5,}$/;
  const PIC_RE  = /^[PF]\d{1,2}$/;
  const RANK_RE = /^(CAP|FO|FDT|PUR|CS|CA|SFO|SCA)$/;
  const HEADER_VALS = new Set([
    'Flight/Activity','From','STD','To','STA','A/C','Acting rank',
    'Duty','PIC code','Crew ID','Name','Comment','Special Duty Code'
  ]);

  const raw = text.split('\n').map(l => l.replace(/\u00A0/g, '').trim());

  // ★ 상단 자기소개 헤더 파싱: "KIM YOUNG JIN  | 1304461  | 737  | CAP"
  let selfInfo = null;
  for (const line of raw) {
    const m = line.match(/^(.+?)\s*\|\s*(\d+)\s*\|\s*\S+\s*\|\s*(\S+)/);
    if (m) { selfInfo = { name: m[1].trim(), crewId: m[2].trim(), rank: m[3].trim() }; break; }
  }

  const vals = [];
  for (let i = 0; i < raw.length; ) {
    if (raw[i] === 'Flight/Activity' && raw[i+1] === 'From' && raw[i+2] === 'STD') {
      i += 13;
    } else {
      if (raw[i]) vals.push(raw[i]);
      i++;
    }
  }

  const flights = {};
  let lastKey = null;
  let pos = 0;

  // comment/SDC 자리 안전 읽기: 헤더 키워드면 빈값 반환하고 pos 진행 안 함
  const readOptional = () => {
    if (pos >= vals.length) return '';
    const v = vals[pos];
    if (HEADER_VALS.has(v) || FN_RE.test(v) || RANK_RE.test(v) || DATE_RE.test(v)) return '';
    pos++;
    return v;
  };

  while (pos < vals.length) {
    const v = vals[pos];

    if (FN_RE.test(v) && pos + 2 < vals.length && DATE_RE.test(vals[pos + 2])) {
      // ── 새 편 시작 ──
      const fn  = vals[pos]; pos++;
      const dep = vals[pos]||''; pos++;
      const std = vals[pos]||''; pos++;
      const arr = vals[pos]||''; pos++;
      const sta = vals[pos]||''; pos++;
      const ac  = vals[pos]||''; pos++;
      const rank = vals[pos]||''; pos++;
      const duty = vals[pos]||''; pos++;
      let crewId = '', name = '', comment = '';
      if (pos < vals.length && PIC_RE.test(vals[pos]))  pos++;          // PIC code 스킵
      if (pos < vals.length && CREW_RE.test(vals[pos])) { crewId = vals[pos]; pos++; }
      if (pos < vals.length && !FN_RE.test(vals[pos]) && !RANK_RE.test(vals[pos]) && !DATE_RE.test(vals[pos]) && !HEADER_VALS.has(vals[pos])) {
        name = vals[pos]; pos++;
      }
      comment = readOptional(); // Comment
      readOptional();           // Special Duty Code

      if (fn && DATE_RE.test(std)) {
        const date    = std.match(/(\d{4}-\d{2}-\d{2})/)[1];
        const depTime = std.replace(/\d{4}-\d{2}-\d{2}\s*/, '').trim();
        const arrDate = (sta.match(/(\d{4}-\d{2}-\d{2})/) || [, date])[1];
        const arrTime = sta.replace(/\d{4}-\d{2}-\d{2}\s*/, '').trim();
        const key = fn + '|' + date;
        lastKey = key;
        if (!flights[key]) flights[key] = { flightNum: fn, date, arrDate, dep, arr, depTime, arrTime, crew: [] };
        if (name) flights[key].crew.push({ crewId, name, rank, duty, comment });
      }

    } else if (RANK_RE.test(v) && lastKey) {
      // ── continuation 행 ──
      const rank = vals[pos]||''; pos++;
      const duty = vals[pos]||''; pos++;
      let crewId = '', name = '', comment = '';
      if (pos < vals.length && PIC_RE.test(vals[pos]))  pos++;
      if (pos < vals.length && CREW_RE.test(vals[pos])) { crewId = vals[pos]; pos++; }
      if (pos < vals.length && !FN_RE.test(vals[pos]) && !RANK_RE.test(vals[pos]) && !DATE_RE.test(vals[pos]) && !HEADER_VALS.has(vals[pos])) {
        name = vals[pos]; pos++;
      }
      comment = readOptional();
      readOptional();
      if (name) flights[lastKey].crew.push({ crewId, name, rank, duty, comment });

    } else {
      pos++;
    }
  }
  return { flights, selfInfo };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Show-up calculation
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getShowUpOffset(dep, arr) {
  const isDom = KOREAN_AIRPORTS.includes(dep) && KOREAN_AIRPORTS.includes(arr);
  if (dep === 'GMP') return isDom ? { min: 70, label: '국내선, 1시간 10분 전' } : { min: 100, label: '국제선, 1시간 40분 전' };
  if (dep === 'ICN') return { min: 95, label: isDom ? '내항기, 1시간 35분 전' : '국제선, 1시간 35분 전' };
  return isDom ? { min: 60, label: '국내선, 1시간 전' } : { min: 80, label: '국제선, 1시간 20분 전' };
}

function calcShowUp(dateStr, timeStr, dep, arr) {
  const [h, m] = timeStr.split(':').map(Number);
  const total = h * 60 + m;
  const { min, label } = getShowUpOffset(dep, arr);
  const su = total - min;
  let suffix = '', sh, sm;
  if (su < 0) { suffix = '(-1)'; const p = su + 1440; sh = Math.floor(p / 60); sm = p % 60; }
  else { sh = Math.floor(su / 60); sm = su % 60; }
  return { display: `${pad(sh)}:${pad(sm)}${suffix}`, label };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Crew list builder
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function rankIdx(r) {
  const i = RANK_ORDER.indexOf((r || '').trim().toUpperCase());
  return i >= 0 ? i : 99;
}

function buildCrewList(crew) {
  if (!crew || !crew.length) return '';
  const nd = c => (c.duty || '').trim().toUpperCase();
  const fly = crew.filter(c => nd(c) === 'FLY' || nd(c) === 'FDT' || (!c.duty && c.rank));
  const tvl = crew.filter(c => nd(c) === 'TVL');
  const sort = arr => [...arr].sort((a, b) => rankIdx(a.rank) - rankIdx(b.rank));
  return [...sort(fly), ...sort(tvl)].map(c => {
    let line = `${c.name} (${c.crewId}, ${c.rank || '?'})`;
    const cmt = (c.comment || '').trim();
    if (cmt) line += ` [${cmt.length > 30 ? cmt.slice(0, 30) + '...' : cmt}]`;
    if (nd(c) === 'TVL') line += ' [TVL]';
    return line;
  }).join('\n');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Merge A + B
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function merge(itemsA, flightsB, crewId, defaultRank) {
  const seen = new Set();
  const dedup = [];
  for (const item of itemsA) {
    if (item.type === 'LO') { const k = item.date + '|' + item.airport; if (seen.has(k)) continue; seen.add(k); }
    dedup.push(item);
  }
  return dedup.map(item => {
    if (item.type !== 'FLIGHT') return { ...item };
    const key = item.flightNum + '|' + item.date;
    const b = flightsB[key];
    let rank = defaultRank, crew = [];
    if (b) {
      const mine = b.crew.find(c => c.crewId === crewId);
      if (mine) rank = mine.rank || defaultRank;
      crew = b.crew;
      return { ...item, depTime: b.depTime || item.depTime, arrTime: b.arrTime || item.arrTime, arrDate: b.arrDate || item.date, actingRank: rank, crew };
    }
    return { ...item, actingRank: rank, crew };
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Build Calendar Events
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildEvents(merged, crewId, defaultRank, selfName) {
  // description에 표시할 본인 정보 한 줄 포맷
  const selfLabel = selfName && crewId && defaultRank
    ? `${selfName} (${crewId}, ${defaultRank})`
    : (crewId ? `${crewId} / ${defaultRank}` : '');
  const events = [];
  let i = 0;
  // pre-compute show-ups: 날짜별 첫 비행마다 Show Up 계산
  let inTrip = false, lastSuDate = null;
  for (const it of merged) {
    if (it.type === 'FLIGHT') {
      if (!inTrip) { inTrip = true; lastSuDate = null; }
      if (it.date !== lastSuDate) {
        it._su = calcShowUp(it.date, it.depTime, it.dep, it.arr);
        lastSuDate = it.date;
      }
    } else if (it.type === 'LO') { /* keep trip */ }
    else { inTrip = false; lastSuDate = null; }
  }

  i = 0;
  while (i < merged.length) {
    const item = merged[i];

    if (['DO','RDO','ADO','ATDO','RESERVE'].includes(item.type)) {
      const disp = ALLDAY_DISPLAY[item.type] || item.type;
      events.push({ type: 'allday', subtype: item.type, date: item.date, title: disp,
        description: `${disp}\n\n${selfLabel}` });
      i++; continue;
    }

    if (item.type === 'HM_SBY' || item.type === 'AP_SBY') {
      const disp = ALLDAY_DISPLAY[item.type];
      const rawCode = item.rawCode || item.type; // 예: HM_SBY12, AP_SBY15
      events.push({ type: 'allday', subtype: item.type, date: item.date, title: disp,
        description: `${disp}\n\n${selfLabel}` });
      if (item.start && item.end) {
        // timed 이벤트 제목은 원본 코드(HM_SBY12, AP_SBY15) 사용
        events.push({ type: 'timed', subtype: item.type, date: item.date,
          title: `${rawCode} ${item.start} - ${item.end}`, start: item.start, end: item.end,
          description: `${rawCode} ${item.start} - ${item.end}\n\nShow Up: ${item.start}\n\n${selfLabel}` });
      }
      i++; continue;
    }

    if (item.type === 'LO') { i++; continue; }

    if (item.type === 'UNKNOWN') {
      const code = item.rawCode;
      // 종일 이벤트 항상 등록
      events.push({ type: 'allday', subtype: 'UNKNOWN', date: item.date, title: code,
        description: `${code}

${selfLabel}` });
      // 시간대가 있으면 Timed 이벤트도 추가 (SBY와 동일 방식)
      if (item.start && item.end) {
        events.push({ type: 'timed', subtype: 'UNKNOWN', date: item.date,
          title: `${code} ${item.start} - ${item.end}`, start: item.start, end: item.end,
          description: `${code} ${item.start} - ${item.end}

${selfLabel}` });
      }
      i++; continue;
    }

    if (item.type === 'FLIGHT') {
      const tripItems = [];
      let j = i;
      while (j < merged.length) {
        const it = merged[j];
        const prev = j > i ? merged[j-1] : null;
        if (it.type === 'FLIGHT') {
          // 날짜가 바뀌는데 직전 항목이 LO가 아니면 → 새 Trip으로 분리
          if (prev && it.date !== prev.date && prev.type !== 'LO') break;
          tripItems.push(it); j++;
        } else if (it.type === 'LO') {
          tripItems.push(it); j++;
        } else {
          break;
        }
      }
      const flights = tripItems.filter(t => t.type === 'FLIGHT');
      const route = [flights[0].dep, ...flights.map(f => f.arr)].join('-');
      const startDate = flights[0].date;
      const endDate = flights[flights.length - 1].arrDate || flights[flights.length - 1].date;

      const tripSu = flights[0]._su;
      const tripSuStr = tripSu ? `\nShow Up: ${tripSu.display} (${tripSu.label})` : '';
      events.push({ type: 'allday', subtype: 'TRIP', date: startDate, endDate, title: route,
        description: `${route}\n기간: ${fmtDateRange(startDate, endDate)}\n${tripSuStr}\n\n${selfLabel}` });

      let lastFlightDate = null;
      for (const f of flights) {
        const su = f._su || null; // 날짜별 첫 비행에만 _su가 설정됨
        const crewStr = (f.crew || []).length ? '\n--- Crew List ---\n' + buildCrewList(f.crew) : '';
        let desc = `${f.flightNum} ${f.depTime} ${f.dep} - ${f.arr} ${f.arrTime}`;
        if (su) desc += `\n\nShow Up: ${su.display} (${su.label})`;
        if (crewStr) desc += '\n' + crewStr;
        events.push({ type: 'timed', subtype: 'FLIGHT', date: f.date, arrDate: f.arrDate || f.date,
          title: `${f.flightNum} ${f.depTime} ${f.dep} - ${f.arr} ${f.arrTime}`,
          start: f.depTime, end: f.arrTime, flightNum: f.flightNum,
          dep: f.dep, arr: f.arr, actingRank: f.actingRank || defaultRank,
          showUp: su ? su.display : null, showUpLabel: su ? su.label : null,
          crew: f.crew || [], description: desc });
        lastFlightDate = f.date;
      }
      i = j; continue;
    }
    i++;
  }
  return events;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Google Calendar API
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function googleLogin() {
  if (!window.google) { alert('Google 라이브러리 로딩 중입니다. 잠시 후 다시 시도하세요.'); return; }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { alert('Google 로그인 실패: ' + resp.error); return; }
      state.accessToken = resp.access_token;
      // fetch user info
      try {
        const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: 'Bearer ' + resp.access_token }
        });
        const info = await r.json();
        state.userEmail = info.email || '';
      } catch (e) {}
      // fetch calendars
      await fetchCalendars();
      render();
    }
  });
  client.requestAccessToken();
}

async function fetchCalendars() {
  try {
    const r = await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList', {
      headers: { Authorization: 'Bearer ' + state.accessToken }
    });
    const data = await r.json();
    state.calendars = (data.items || []).filter(c => c.accessRole === 'owner' || c.accessRole === 'writer');
  } catch (e) { state.calendars = []; }
}

function googleLogout() {
  if (state.accessToken && window.google) {
    google.accounts.oauth2.revoke(state.accessToken);
  }
  state.accessToken = null;
  state.userEmail = '';
  state.calendars = [];
  render();
}

function toGCalEvent(ev) {
  if (ev.type === 'allday') {
    const endDate = addDay(ev.endDate || ev.date);
    return {
      summary: ev.title,
      description: ev.description || '',
      start: { date: ev.date },
      end: { date: endDate }
    };
  } else {
    // timed event
    const startDT = `${ev.date}T${ev.start}:00`;
    // handle overnight flights
    let arrDate = ev.arrDate || ev.date;
    const endDT = `${arrDate}T${ev.end}:00`;
    return {
      summary: ev.title,
      description: ev.description || '',
      start: { dateTime: startDT, timeZone: TZ },
      end: { dateTime: endDT, timeZone: TZ }
    };
  }
}

async function uploadToGCal() {
  if (!state.accessToken) { alert('먼저 Google 계정에 로그인해주세요.'); return; }
  if (!state.events.length) { alert('등록할 이벤트가 없습니다.'); return; }

  state.uploading = true;
  state.uploadLog = [];
  state.uploadDone = false;
  state.uploadResults = { ok: 0, skip: 0, fail: 0 };
  render();

  const calId = encodeURIComponent(state.selectedCalendarId);
  const BATCH = 5; // polite rate limit

  // 날짜 필터 적용
  const uploadEvs = state.filterFromDate
    ? state.events.filter(ev => ev.date >= state.filterFromDate)
    : state.events;

  for (let i = 0; i < uploadEvs.length; i++) {
    const ev = uploadEvs[i];
    const body = toGCalEvent(ev);

    try {
      // duplicate check: search by summary + date
      const checkFrom = ev.date + 'T00:00:00Z';
      const checkTo = addDay(ev.endDate || ev.date) + 'T00:00:00Z';
      const searchUrl = `https://www.googleapis.com/calendar/v3/calendars/${calId}/events?q=${encodeURIComponent(ev.title)}&timeMin=${checkFrom}&timeMax=${checkTo}&singleEvents=true`;
      const searchR = await fetch(searchUrl, { headers: { Authorization: 'Bearer ' + state.accessToken } });
      const searchData = await searchR.json();
      const existing = (searchData.items || []).find(e => e.summary === ev.title);

      if (existing) {
        state.uploadResults.skip++;
        state.uploadLog.push(`⏭  SKIP  ${ev.date} │ ${ev.title}`);
      } else {
        const postR = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${calId}/events`, {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + state.accessToken, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (postR.ok) {
          state.uploadResults.ok++;
          state.uploadLog.push(`✓  OK    ${ev.date} │ ${ev.title}`);
        } else {
          const err = await postR.json();
          state.uploadResults.fail++;
          state.uploadLog.push(`✗  FAIL  ${ev.date} │ ${ev.title} (${err.error?.message || postR.status})`);
        }
      }
    } catch (e) {
      state.uploadResults.fail++;
      state.uploadLog.push(`✗  ERR   ${ev.date} │ ${ev.title} (${e.message})`);
    }

    // update progress UI every item
    const pct = Math.round(((i + 1) / uploadEvs.length) * 100);
    const pb = document.getElementById('upload-progress');
    const pl = document.getElementById('upload-pct');
    const rl = document.getElementById('result-log');
    if (pb) pb.style.width = pct + '%';
    if (pl) pl.textContent = pct + '%';
    if (rl) { rl.textContent = state.uploadLog.join('\n'); rl.scrollTop = rl.scrollHeight; }

    // small delay every BATCH to avoid rate limiting
    if ((i + 1) % BATCH === 0) await sleep(500);
  }

  state.uploading = false;
  state.uploadDone = true;
  render();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CSV Export
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function exportCSV() {
  if (!state.events.length) { alert('내보낼 이벤트가 없습니다.'); return; }

  const headers = ['Subject','Start Date','Start Time','End Date','End Time','All Day Event','Description'];
  const rows = [headers];

  // 날짜 필터 적용
  const exportEvs = state.filterFromDate
    ? state.events.filter(ev => ev.date >= state.filterFromDate)
    : state.events;

  for (const ev of exportEvs) {
    if (ev.type === 'allday') {
      // Google Calendar CSV 포맷: 종일 이벤트 End Date는 마지막날 +1일 (exclusive)
      const endDate = addDay(ev.endDate || ev.date);
      rows.push([
        csvEsc(ev.title),
        fmtCSVDate(ev.date), '',
        fmtCSVDate(endDate), '',
        'TRUE',
        csvEsc(ev.description || '')
      ]);
    } else {
      rows.push([
        csvEsc(ev.title),
        fmtCSVDate(ev.date), ev.start || '',
        fmtCSVDate(ev.arrDate || ev.date), ev.end || '',
        'FALSE',
        csvEsc(ev.description || '')
      ]);
    }
  }

  const csv = '\uFEFF' + rows.map(r => r.join(',')).join('\r\n'); // BOM for Excel
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ke_schedule_${state.year}${pad(state.month)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function csvEsc(s) {
  if (!s) return '""';
  // RFC 4180: 따옴표로 감싼 필드 안의 실제 줄바꿈은 Google Calendar CSV에서 정상 인식
  // \n을 문자열로 치환하지 않고 실제 줄바꿈(\r\n)으로 유지
  return '"' + String(s).replace(/"/g, '""').replace(/\r?\n/g, '\r\n') + '"';
}

function fmtCSVDate(dateStr) {
  // Returns MM/DD/YYYY for Google Calendar import compatibility
  const [y, m, d] = dateStr.split('-');
  return `${m}/${d}/${y}`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Helpers
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function pad(n) { return String(n).padStart(2, '0'); }
function addDay(dateStr) {
  // toISOString()은 UTC 변환으로 UTC+9에서 하루 당겨지므로 로컬 계산 사용
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d + 1);
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function fmtD(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return `${pad(d.getMonth() + 1)}/${pad(d.getDate())}`;
}
function fmtDateRange(s, e) {
  const DAYS = ['일','월','화','수','목','금','토'];
  const fmt = ds => { const d = new Date(ds + 'T00:00:00'); return `${pad(d.getMonth()+1)}/${pad(d.getDate())} (${DAYS[d.getDay()]})`; };
  return s === e ? fmt(s) : `${fmt(s)} ~ ${fmt(e)}`;
}
function getEventDates(ev) {
  if (ev.type === 'allday' && ev.endDate && ev.endDate !== ev.date) {
    const dates = [];
    const [sy, sm, sd] = ev.date.split('-').map(Number);
    const [ey, em, ed] = ev.endDate.split('-').map(Number);
    let d = new Date(sy, sm-1, sd);
    const end = new Date(ey, em-1, ed);
    const fmt = dt => dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
    while (d <= end) { dates.push(fmt(d)); d.setDate(d.getDate() + 1); }
    return dates;
  }
  return [ev.date];
}
function evClass(ev) {
  if (ev.subtype === 'FLIGHT') return 'ev-flight';
  if (ev.subtype === 'TRIP') return 'ev-trip';
  if (['DO','ADO','ATDO'].includes(ev.subtype)) return 'ev-do';
  if (ev.subtype === 'RDO') return 'ev-rdo';
  if (ev.subtype === 'HM_SBY' || ev.subtype === 'AP_SBY') return 'ev-sby';
  if (ev.subtype === 'RESERVE') return 'ev-reserve';
  return 'ev-do';
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Render
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function render() {
  renderSteps();
  const c = document.getElementById('content');
  if (state.step === 1) c.innerHTML = renderStep1();
  else if (state.step === 2) c.innerHTML = renderStep2();
  else if (state.step === 3) c.innerHTML = renderStep3();
  attachListeners();
}

function renderSteps() {
  const labels = ['입력', '파싱 확인', '등록'];
  document.getElementById('steps-bar').innerHTML = labels.map((l, idx) => {
    const n = idx + 1;
    const cls = n === state.step ? 'active' : n < state.step ? 'done' : '';
    return `<div class="step ${cls}" onclick="goStep(${n})"><span class="step-num">${n}</span>${l}</div>`;
  }).join('');
}

function goStep(n) {
  if (n === 2 && state.step === 1) doParseAndGo();
  else if (n === 3 && state.step === 2) doEventsAndGo();
  else if (n < state.step) { state.step = n; render(); }
}

function doParseAndGo() {
  if (!state.textA.trim()) { alert('달력 텍스트를 입력해주세요.'); return; }
  // 연도/월 자동 감지
  const detected = autoDetectYearMonth(state.textA, state.textB);
  state.year = detected.year;
  state.month = detected.month;
  state.detectedSource = detected.source;
  state.parsedA = parseTextA(state.textA);
  const bResult = state.textB.trim() ? parseTextB(state.textB) : { flights: {}, selfInfo: null };
  state.parsedB = bResult.flights;
  // ★ 헤더에서 감지된 본인 정보 적용
  if (bResult.selfInfo) {
    state.crewId    = bResult.selfInfo.crewId;
    state.actingRank = bResult.selfInfo.rank;
    state.selfName  = bResult.selfInfo.name;
  }
  state.merged = merge(state.parsedA, state.parsedB, state.crewId, state.actingRank);
  state.step = 2;
  render();
}

function doEventsAndGo() {
  state.events = buildEvents(state.merged, state.crewId, state.actingRank, state.selfName);
  state.uploadLog = [];
  state.uploadDone = false;
  state.uploadResults = { ok: 0, skip: 0, fail: 0 };
  state.step = 3;
  render();
  window.scrollTo({ top: 0, behavior: 'auto' });
}

// ── Step 1 ──
function renderStep1() {
  return `
<div class="card">
  <h2>📅 달력 텍스트 — 입력창 A</h2>
  <div class="alert alert-info">사내 월간 스케줄 화면에서 <strong>Ctrl+A → Ctrl+C</strong> 후 아래에 붙여넣으세요.</div>
  <textarea id="inp-a" rows="14" placeholder="여기에 붙여넣으세요...">${state.textA}</textarea>
</div>
<div class="card">
  <h2>👥 Crew List 텍스트 — 입력창 B <span style="font-size:10px;color:#888;font-weight:400">(선택)</span></h2>
  <div class="alert alert-info">크루 테이블에서 <strong>Ctrl+A → Ctrl+C</strong> 후 붙여넣으세요. 없으면 생략 가능.</div>
  <textarea id="inp-b" rows="10" placeholder="여기에 붙여넣으세요...">${state.textB}</textarea>
</div>
<div class="actions">
  <button class="btn btn-primary" onclick="doParseAndGo()">파싱 및 결과 확인 →</button>
</div>`;
}

// ── Step 2 ──
function renderStep2() {
  const items = state.merged;
  let inTrip = false, isFirst = true;
  for (const it of items) {
    if (it.type === 'FLIGHT') {
      if (!inTrip) { inTrip = true; isFirst = true; }
      if (isFirst) { const su = calcShowUp(it.date, it.depTime, it.dep, it.arr); it._suDisp = su.display; it._suLabel = su.label; }
      else { it._suDisp = '(연속편)'; it._suLabel = ''; }
      isFirst = false;
    } else if (it.type !== 'LO') { inTrip = false; isFirst = true; }
  }

  const rows = items.map(it => {
    if (it.type === 'LO') return `<tr class="lo-row"><td>${fmtD(it.date)}</td><td><span class="badge badge-lo">LO</span></td><td colspan="5" style="color:#bbb">${it.airport} 체류</td></tr>`;
    const badgeCls = { FLIGHT:'badge-flight', DO:'badge-do', RDO:'badge-do', ADO:'badge-do', ATDO:'badge-do', HM_SBY:'badge-sby', AP_SBY:'badge-sby', RESERVE:'badge-reserve' }[it.type] || 'badge-lo';
    const disp = ALLDAY_DISPLAY[it.type] || it.type;
    if (it.type === 'FLIGHT') {
      return `<tr><td>${fmtD(it.date)}</td><td><span class="badge ${badgeCls}">FLIGHT</span></td>
        <td style="font-family:'IBM Plex Mono',monospace;font-weight:600">${it.flightNum}</td>
        <td>${it.dep} ${it.depTime}</td><td>${it.arr} ${it.arrTime}</td>
        <td>${it.actingRank || '-'}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:${it._suDisp==='(연속편)'?'#888':'#0a2540'}">${it._suDisp || '-'}</td></tr>`;
    }
    return `<tr><td>${fmtD(it.date)}</td><td><span class="badge ${badgeCls}">${disp}</span></td><td colspan="5" style="color:#666">${disp}</td></tr>`;
  }).join('');

  return `
<div class="alert alert-info" style="margin-bottom:10px">
  📅 감지된 스케줄: <strong>${state.year}년 ${state.month}월</strong>
  <span style="opacity:0.7;font-size:11px"> (${state.detectedSource || '자동 감지'})</span>
  &nbsp;|&nbsp; 다른 월이면
  <button class="btn btn-secondary btn-sm" onclick="state.step=1;render()">← 되돌아가기</button>
  후 수동 조정하세요.
</div>
<div class="summary-bar">
  <div class="summary-item"><span class="summary-num">${items.length}</span><span class="summary-label">총 항목</span></div>
  <div class="summary-item"><span class="summary-num">${items.filter(i=>i.type==='FLIGHT').length}</span><span class="summary-label">비행편</span></div>
  <div class="summary-item"><span class="summary-num">${items.filter(i=>['DO','RDO','ADO'].includes(i.type)).length}</span><span class="summary-label">휴무</span></div>
  <div class="summary-item"><span class="summary-num">${items.filter(i=>i.type==='RESERVE').length}</span><span class="summary-label">RESERVE</span></div>
  <div class="summary-item"><span class="summary-num">${items.filter(i=>i.type==='HM_SBY'||i.type==='AP_SBY').length}</span><span class="summary-label">SBY</span></div>
</div>
<div class="card">
  <h2>📋 파싱 결과</h2>
  <div style="overflow-x:auto">
    <table>
      <thead><tr><th>날짜</th><th>유형</th><th>편명</th><th>출발</th><th>도착</th><th>Rank</th><th>쇼업</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
</div>
<div class="actions">
  <button class="btn btn-secondary" onclick="state.step=1;render()">← 수정</button>
  <button class="btn btn-primary" onclick="doEventsAndGo()">이벤트 생성 및 등록 →</button>
</div>`;
}

// ── Step 3 ──
function renderStep3() {
  const evs = state.events;

  // ── Calendar preview ──
  const y = state.year, m = state.month;
  const firstDay = new Date(y, m - 1, 1).getDay();
  const daysInMonth = new Date(y, m, 0).getDate();
  const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

  const byDate = {};
  for (const ev of evs) for (const d of getEventDates(ev)) { if (!byDate[d]) byDate[d] = []; byDate[d].push(ev); }

  let calCells = '';
  for (let d = 0; d < firstDay; d++) calCells += `<div class="cal-cell other-month"></div>`;
  for (let day = 1; day <= daysInMonth; day++) {
    const ds = `${y}-${pad(m)}-${pad(day)}`;
    const dayEvs = byDate[ds] || [];
    const evHtml = dayEvs.slice(0, 3).map(ev => `<div class="cal-event ${evClass(ev)}">${ev.title.length > 17 ? ev.title.slice(0, 17) + '…' : ev.title}</div>`).join('');
    const more = dayEvs.length > 3 ? `<div style="font-size:9px;color:#888;font-family:'IBM Plex Mono',monospace">+${dayEvs.length - 3}</div>` : '';
    const sel = state.selectedDate === ds;
    calCells += `<div class="cal-cell${sel ? ' selected' : ''}" onclick="selectDate('${ds}')">
      <div class="date-num">${day}</div>${evHtml}${more}</div>`;
  }

  let detailHtml = '';
  if (state.selectedDate) {
    const selEvs = byDate[state.selectedDate] || [];
    detailHtml = `<div class="detail-panel">
      <h3>${fmtD(state.selectedDate)} — ${selEvs.length}개 이벤트</h3>
      ${selEvs.length ? selEvs.map(ev => `<div class="ev-detail-block">
        <div class="ev-detail-title"><span class="badge ${evClass(ev)}" style="margin-right:5px">${ev.type === 'allday' ? 'ALL-DAY' : 'TIMED'}</span>${ev.title}</div>
        ${ev.description ? `<pre class="desc-block">${ev.description}</pre>` : ''}
      </div>`).join('') : '<p style="color:#888;font-size:12px">이벤트 없음</p>'}
    </div>`;
  }

  // ── Auth bar ──
  const authBar = state.accessToken
    ? `<div class="auth-bar">
        <div class="auth-dot ok"></div>
        <span class="auth-status-text">로그인됨: <span class="auth-user">${state.userEmail}</span></span>
        <button class="btn btn-danger btn-sm" onclick="googleLogout()">로그아웃</button>
       </div>`
    : `<div class="auth-bar">
        <div class="auth-dot no"></div>
        <span class="auth-status-text">Google 계정 로그인이 필요합니다.</span>
        <button class="btn btn-google btn-sm" onclick="googleLogin()">Google 로그인</button>
       </div>`;

  // ── Calendar selector ──
  const calSelector = state.accessToken && state.calendars.length
    ? `<div class="form-group" style="margin-bottom:10px">
        <label>등록할 캘린더</label>
        <select id="cal-select" onchange="state.selectedCalendarId=this.value" style="width:100%;padding:8px 10px;border:1px solid rgba(0,0,0,.18);border-radius:5px;font-size:13px;font-family:'IBM Plex Mono',monospace">
          ${state.calendars.map(c => `<option value="${c.id}" ${c.id === state.selectedCalendarId ? 'selected' : ''}>${c.summary}${c.primary ? ' (기본)' : ''}</option>`).join('')}
        </select>
       </div>` : '';

  // ── Upload progress / results ──
  const totalEvs = state.filterFromDate ? evs.filter(e=>e.date>=state.filterFromDate).length : evs.length;
  const done = state.uploadResults.ok + state.uploadResults.skip + state.uploadResults.fail;
  const pct = totalEvs ? Math.round((done / totalEvs) * 100) : 0;
  const uploadSection = (state.uploading || state.uploadDone) ? `
    <div style="margin-top:12px">
      <div style="display:flex;justify-content:space-between;font-size:11px;font-family:'IBM Plex Mono',monospace;margin-bottom:3px">
        <span>진행중... ${done}/${totalEvs}</span><span id="upload-pct">${pct}%</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="upload-progress" style="width:${pct}%"></div></div>
      ${state.uploadDone ? `<div class="alert alert-success" style="margin-top:8px">
        완료: ✓ ${state.uploadResults.ok}개 등록 · ⏭ ${state.uploadResults.skip}개 건너뜀 · ✗ ${state.uploadResults.fail}개 실패
      </div>` : ''}
      <div class="result-log" id="result-log">${state.uploadLog.join('\n')}</div>
    </div>` : '';

  // ── Event list ──
  const tabDefs = [
    { key: 'all',     label: 'Total Events', count: evs.length, alwaysShow: true },
    { key: 'FLIGHT',  label: 'Flights',      count: evs.filter(e=>e.subtype==='FLIGHT').length },
    { key: 'TRIP',    label: 'Routes',       count: evs.filter(e=>e.subtype==='TRIP').length },
    { key: 'DO',      label: 'DO',           count: evs.filter(e=>['DO','RDO','ADO','ATDO'].includes(e.subtype)).length },
    { key: 'SBY',     label: 'ST-BY',        count: evs.filter(e=>['HM_SBY','AP_SBY'].includes(e.subtype)&&e.type==='timed').length },
    { key: 'RESERVE', label: 'RESERVE',      count: evs.filter(e=>e.subtype==='RESERVE').length },
    { key: 'ANNUAL',  label: 'Annual Leaves',count: evs.filter(e=>e.subtype==='UNKNOWN'&&['ALV','ALM'].includes(e.title)).length },
  ];
  const evListHtml = `
    <div class="tab-bar">
      ${tabDefs.filter(t=>t.alwaysShow||t.count>0).map((t,idx)=>
        `<div class="tab${idx===0?' active':''}" onclick="filterEvs('${t.key}',this)">${t.label} (${t.count})</div>`
      ).join('')}
    </div>
    <div id="ev-list">${renderEventList(evs)}</div>`;

  return `
${(() => {
  const stats = [
    { label: 'Total Events', count: evs.length, alwaysShow: true },
    { label: 'Flights',      count: evs.filter(e=>e.subtype==='FLIGHT').length },
    { label: 'Routes',       count: evs.filter(e=>e.subtype==='TRIP').length },
    { label: 'DO',           count: evs.filter(e=>['DO','RDO','ADO','ATDO'].includes(e.subtype)).length },
    { label: 'ST-BY',        count: evs.filter(e=>['HM_SBY','AP_SBY'].includes(e.subtype)&&e.type==='timed').length },
    { label: 'RESERVE',      count: evs.filter(e=>e.subtype==='RESERVE').length },
    { label: 'Annual Leaves',count: evs.filter(e=>e.subtype==='UNKNOWN'&&['ALV','ALM'].includes(e.title)).length },
  ];
  return '<div class="summary-bar">' +
    stats.filter(s=>s.alwaysShow||s.count>0).map(s=>
      `<div class="summary-item"><span class="summary-num">${s.count}</span><span class="summary-label">${s.label}</span></div>`
    ).join('') +
  '</div>';
})()}

<div class="card">
  <h2>📆 ${y}년 ${m}월 미리보기 <span style="font-size:11px;font-weight:400;color:#888">(날짜 클릭시 상세)</span></h2>
  <div class="cal-grid" style="margin-bottom:6px">${dayNames.map(d => `<div class="cal-header-cell">${d}</div>`).join('')}</div>
  <div class="cal-grid">${calCells}</div>
  ${detailHtml}
</div>

<div class="card">
  <h2>☁ Google Calendar 등록</h2>
  ${authBar}
  ${calSelector}
  <div class="form-group" style="margin-bottom:12px">
    <label style="display:block;font-size:11px;font-weight:600;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace">
      이 날짜 이후만 등록 <span style="font-weight:400;color:#aaa">(비워두면 전체 등록)</span>
    </label>
    <input type="date" id="inp-filter-date" value="${state.filterFromDate}"
      onchange="state.filterFromDate=this.value;render()"
      style="padding:7px 10px;border:1px solid rgba(0,0,0,.18);border-radius:5px;font-size:13px;font-family:'IBM Plex Mono',monospace;width:180px">
    ${state.filterFromDate ? `<button class="btn btn-secondary btn-sm" style="margin-left:8px" onclick="state.filterFromDate='';render()">✕ 초기화</button>
      <span style="margin-left:8px;font-size:11px;color:#2962a8;font-family:'IBM Plex Mono',monospace">
        ${state.filterFromDate} 이후: <strong>${evs.filter(e => e.date >= state.filterFromDate).length}개</strong> 등록 예정
      </span>` : ''}
  </div>
  <div class="export-section">
    <div class="export-card gcal">
      <h3>🗓 Google Calendar</h3>
      <p>Google 계정에 직접 이벤트를 등록합니다.<br>중복된 이벤트는 자동으로 건너뜁니다.<br>총 <strong>${state.filterFromDate ? evs.filter(e=>e.date>=state.filterFromDate).length : evs.length}개</strong> 이벤트 등록 예정.</p>
      <button class="btn btn-google" onclick="uploadToGCal()" ${state.uploading ? 'disabled' : ''}>
        ${state.uploading ? '⏳ 등록 중...' : '▶ Google Calendar에 등록'}
      </button>
    </div>
    <div class="export-card csv">
      <h3>📄 CSV 파일 저장</h3>
      <p>Google Calendar 가져오기 형식으로 CSV를 저장합니다.<br>Google Calendar → 설정 → 가져오기에서 사용 가능.<br>Excel에서도 열 수 있습니다.</p>
      <button class="btn btn-csv" onclick="exportCSV()">⬇ CSV 파일 다운로드</button>
    </div>
  </div>
  ${uploadSection}
</div>

<div class="card">
  <h2>📊 이벤트 목록</h2>
  ${evListHtml}
</div>

<div class="actions">
  <button class="btn btn-secondary" onclick="state.step=2;render()">← 파싱 수정</button>
</div>`;
}

function renderEventList(evs) {
  if (!evs.length) return '<p style="color:#999;font-size:12px;text-align:center;padding:20px;font-family:\'IBM Plex Mono\',monospace">해당 이벤트 없음</p>';
  return evs.map(ev => `
    <div style="display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:.5px solid rgba(0,0,0,.07)">
      <div style="min-width:46px;font-size:11px;color:#666;padding-top:2px;font-family:'IBM Plex Mono',monospace;font-weight:600">${fmtD(ev.date)}</div>
      <div style="min-width:54px"><span class="badge ${evClass(ev)}">${ev.type === 'allday' ? 'ALL-DAY' : 'TIMED'}</span></div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:600;font-family:'IBM Plex Mono',monospace">${ev.title}</div>
        ${ev.showUp ? `<div style="font-size:10px;color:#b45309;font-family:'IBM Plex Mono',monospace;margin-top:2px">SHOW UP: ${ev.showUp} (${ev.showUpLabel})</div>` : ''}
      </div>
    </div>`).join('');
}

function filterEvs(type, el) {
  document.querySelectorAll('.tab-bar .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const f = {
    all:     () => state.events,
    FLIGHT:  () => state.events.filter(e => e.subtype === 'FLIGHT'),
    TRIP:    () => state.events.filter(e => e.subtype === 'TRIP'),
    DO:      () => state.events.filter(e => ['DO','RDO','ADO','ATDO'].includes(e.subtype)),
    SBY:     () => state.events.filter(e => ['HM_SBY','AP_SBY'].includes(e.subtype) && e.type === 'timed'),
    RESERVE: () => state.events.filter(e => e.subtype === 'RESERVE'),
    ANNUAL:  () => state.events.filter(e => e.subtype === 'UNKNOWN' && ['ALV','ALM'].includes(e.title)),
  };
  document.getElementById('ev-list').innerHTML = renderEventList((f[type] || f.all)());
}

function selectDate(d) { state.selectedDate = state.selectedDate === d ? null : d; render(); }

function attachListeners() {
  const bind = (id, fn) => { const el = document.getElementById(id); if (el) el.addEventListener('input', fn); };
  bind('inp-a', e => { state.textA = e.target.value; });
  bind('inp-b', e => { state.textB = e.target.value; });
  // 연도/월은 doParseAndGo()에서 자동 감지
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Init
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
render();
</script>
